services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackit_sentry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=db;Database=hackit_sentry;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Key: "${JWT_KEY:-change-this-secret-in-production-must-be-at-least-32-chars!!}"
      Encryption__Key: "${ENCRYPTION_KEY:-change-this-aes-key-in-production-32chars!!}"
      CheckinIntervalMinutes: ${CHECKIN_INTERVAL_MINUTES:-30}
      Email__Host: "${EMAIL_HOST:-}"
      Email__Port: "${EMAIL_PORT:-587}"
      Email__Username: "${EMAIL_USERNAME:-}"
      Email__Password: "${EMAIL_PASSWORD:-}"
      Email__From: "${EMAIL_FROM:-sentry@localhost}"
      Email__To: "${EMAIL_TO:-}"
      Email__UseSsl: "${EMAIL_USE_SSL:-false}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/auth/login || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8030:80"

volumes:
  postgres_data:
