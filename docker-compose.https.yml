# HTTPS override – use with:
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
#
# Prerequisites:
#   - Place SSL certificates in ./certs/fullchain.pem and ./certs/privkey.pem
#   - For Let's Encrypt:  certbot certonly --standalone -d your-domain.com
#     then copy: /etc/letsencrypt/live/your-domain.com/fullchain.pem  → ./certs/
#                /etc/letsencrypt/live/your-domain.com/privkey.pem    → ./certs/

services:
  frontend:
    ports: []  # no direct port exposure; nginx-proxy handles all traffic

  nginx-proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
